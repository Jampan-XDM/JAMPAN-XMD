<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMPAN XMD BOT</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      font-size: 32px;
      background: linear-gradient(90deg, #00ffd5, #4f46e5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    button {
      padding: 12px 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(90deg, #00ffd5, #4f46e5);
      color: black;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #statusBox {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.9;
    }

    .online {
      color: #00ff88;
    }

    .offline {
      color: red;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>🚀 JAMPAN XMD BOT</h1>
    <p>WhatsApp Multi-Device Backend Dashboard</p>

    <div class="card">

      <h2>📡 Bot Control Panel</h2>

      <button onclick="checkStatus()">🔍 Check Bot Status</button>
      <button onclick="pairBot()">📲 Generate Pair Code</button>

      <div id="statusBox">Status: Not checked</div>

    </div>

    <div class="card">
      <h3>⚡ Quick Info</h3>
      <p>Owner: Kelvin Jampan</p>
      <p>System: JAMPAN XMD</p>
      <p>Platform: Heroku Backend</p>
    </div>

  </div>

  <script>
    // CHECK BACKEND STATUS
    async function checkStatus() {
      const box = document.getElementById("statusBox");

      try {
        const res = await fetch("/status");
        const data = await res.json();

        box.innerHTML = `
          Status: <span class="online">${data.status}</span><br>
          Bot: ${data.bot}<br>
          Owner: ${data.owner}
        `;
      } catch (err) {
        box.innerHTML = `Status: <span class="offline">OFFLINE / ERROR</span>`;
      }
    }

    // PAIR BUTTON (link to backend endpoint later)
    function pairBot() {
      alert("Pair system endpoint bado kuconnect backend 😎");
      // unaweza baadaye kufanya: window.location.href = "/pair"
    }
  </script>

</body>
</html>
