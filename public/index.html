<!DOCTYPE html>
<html>
<head>
  <title>JAMPAN XMD</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 80px;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      margin: auto;
      width: 80%;
      border-radius: 12px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>🚀 JAMPAN XMD BOT</h1>
    <p id="status">Checking status...</p>

    <button onclick="check()">Check Status</button>
  </div>

  <script>
    async function check() {
      try {
        const res = await fetch("/status");
        const data = await res.json();

        document.getElementById("status").innerHTML =
          "Status: " + data.status + "<br>Bot: " + data.bot;
      } catch (e) {
        document.getElementById("status").innerHTML = "❌ Error connecting backend";
      }
    }

    check();
  </script>

</body>
</html>
